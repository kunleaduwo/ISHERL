{% load i18n %} 
{% load static %}
{% comment %} {% if cancel_url %}
  <a href="{{ cancel_url }}"
     class="float-right btn btn-link">{% trans "Cancel" %}</a>
{% endif %} {% endcomment %}
{% if wizard.steps.prev %}
  <button name="wizard_goto_step" type="submit"
          value="{{ wizard.steps.prev }}"
          {% comment %} class="btn btn-secondary">{% trans "Back" %}</button> {% endcomment %}
{% else %}
  {% comment %} <button disabled name="" type="button" class="btn">{% trans "Back" %}</button> {% endcomment %}
{% endif %}
<button type="submit" class="btn btn-primary">{% trans "Login" %}</button>
